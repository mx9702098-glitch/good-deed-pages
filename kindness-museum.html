<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>善意博物馆 · 板块 Demo</title>
<style>
  :root{--bg:#f6f1e8;--paper:#fffdf8;--ink:#2b2620;--sub:#a89e92;--line:#ece3d6;--warm:#e8924e;--rose:#e07a6e;--green:#7da585;--flower:#df603f;--shadow:0 4px 16px rgba(150,120,80,.10)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#ddcfb8;font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;display:flex;justify-content:center;min-height:100vh;color:var(--ink)}
  .phone{width:390px;height:844px;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);display:flex;flex-direction:column}
  @media(max-width:430px){.phone{width:100vw;height:100vh}}
  .pushscreen{position:absolute;inset:0;background:#ededed;z-index:55;display:none;flex-direction:column;padding-top:42px}
  .pushscreen.on{display:flex;animation:fade .25s}
  .wxhead{background:#ededed;color:var(--ink);padding:12px 18px;text-align:center;font-size:15px;font-weight:600;border-bottom:1px solid #ddd;flex:none}
  .wxchat{flex:1;overflow-y:auto;padding:22px 16px}
  .wxname{font-size:11px;color:#999;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .wxav{width:26px;height:26px;border-radius:5px;background:var(--warm);display:inline-flex;align-items:center;justify-content:center;font-size:14px}
  .wxbubble{max-width:80%;background:#fff;border-radius:4px 14px 14px 14px;padding:14px 16px;font-size:14px;line-height:1.75;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .wxbubble b{font-family:"Songti SC","STSong",serif;font-size:15px}
  .wxsub{font-size:12px;color:#999}
  .wxlink{margin-top:12px;background:#f7f7f7;border-radius:8px;padding:12px;border:1px solid #eee;cursor:pointer}
  .wxlink-t{font-size:13px;font-weight:700;margin-bottom:4px}
  .wxlink-d{font-size:11px;color:#999}
  .scenebar{position:absolute;top:7px;left:50%;transform:translateX(-50%);z-index:200;display:flex;background:rgba(43,38,32,.82);backdrop-filter:blur(6px);border-radius:13px;padding:3px}
  .scenebar button{border:none;background:transparent;color:rgba(246,241,232,.6);font-size:11px;font-weight:600;padding:5px 11px;border-radius:10px;cursor:pointer}
  .scenebar button.on{background:#f6f1e8;color:var(--ink)}
  .status{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:13px;font-weight:600;flex:none}
  .ctx{display:flex;align-items:center;gap:6px;padding:2px 18px 6px;font-size:12px;color:var(--sub);flex:none}
  .ctx b{color:var(--ink)}
  .head{padding:2px 18px 6px;flex:none}
  .hrow{display:flex;align-items:center;justify-content:space-between}
  .head h1{font-size:20px;letter-spacing:1px;display:flex;align-items:center;gap:7px}
  .head .sub{font-size:12px;color:var(--sub);margin-top:4px;font-style:italic}
  .fpill{font-size:12px;background:#fbe1d8;color:var(--flower);padding:5px 11px;border-radius:13px;font-weight:700;white-space:nowrap}
  .scroll{flex:1;overflow-y:auto;padding:2px 12px 92px;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}
  .curate{margin:6px 6px 4px}
  .ctitle{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px;margin:4px 2px 9px}
  .ctitle span{font-size:10px;color:var(--sub);font-weight:500}
  .crow{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
  .crow::-webkit-scrollbar{display:none}
  .ccard{flex:none;width:152px;background:var(--paper);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:13px 12px 11px;cursor:pointer;text-align:center;position:relative}
  .ccard .badge{position:absolute;top:8px;left:8px;font-size:9px;background:var(--flower);color:#fff;padding:2px 6px;border-radius:6px;font-weight:700}
  .ccard .t{font-size:13px;line-height:1.5;font-weight:600;font-family:"Songti SC","STSong",serif;margin-top:8px;min-height:44px}
  .ccard svg{width:74px;height:70px;margin:8px 0 2px}
  .ccard .f{font-size:11px;opacity:.85}
  .galbtn{width:100%;margin:8px 2px 2px;padding:11px;border-radius:12px;background:#efe6d6;border:1px dashed #d8c9b0;color:var(--ink);font-size:13px;font-weight:700;cursor:pointer}
  .sech{font-size:13px;font-weight:800;margin:14px 8px 8px;display:flex;align-items:center;gap:6px}
  .sech span{font-size:10px;color:var(--sub);font-weight:500}
  .wall{column-count:2;column-gap:10px;padding:0 4px}
  .poster{break-inside:avoid;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:13px 12px 9px;margin-bottom:10px;box-shadow:var(--shadow);text-align:center;position:relative}
  .poster .pk{position:absolute;top:9px;right:9px;font-size:9px;background:#fbe7d9;color:var(--flower);padding:2px 6px;border-radius:6px;font-weight:700}
  .poster.reply{border:none;padding:22px 15px 13px;min-height:168px;display:flex;flex-direction:column;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .poster.reply .rq{position:absolute;top:0;left:12px;font-size:52px;line-height:1;color:rgba(120,90,50,.13);font-family:Georgia,"Songti SC",serif;font-weight:700}
  .poster.reply .replytext{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;font-size:15.5px;line-height:1.85;color:#3a322a;font-weight:500;font-family:"Songti SC","STSong",serif;position:relative;z-index:1;padding:6px 2px}
  .poster.reply .replysig{text-align:center;font-size:11px;color:#9a8a72;margin-top:8px}
  .poster.reply .replyref{margin-top:13px;background:rgba(255,255,255,.5);border-radius:10px;padding:7px 11px;font-size:10.5px;color:#8a7350;text-align:center;line-height:1.4}
  .poster.reply .replyref b{color:#5c4a30;font-weight:600}
  .poster.reply .rphotosm{width:100%;border-radius:9px;margin-bottom:10px;display:block}
  .replybig{border-radius:14px;padding:26px 18px 16px;text-align:center;position:relative;box-shadow:var(--shadow);margin-bottom:14px}
  .replybig .rq{position:absolute;top:4px;left:16px;font-size:54px;color:rgba(120,90,50,.13);font-family:Georgia,serif;font-weight:700;line-height:1}
  .replybig .rphoto{width:100%;border-radius:12px;margin-bottom:14px;display:block}
  .replytextbig{font-size:18px;line-height:1.85;color:#3a322a;font-weight:500;font-family:"Songti SC","STSong",serif;position:relative;z-index:1}
  .replybig .replysig{font-size:12px;color:#9a8a72;margin-top:12px}
  .refcard{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:9px 11px;cursor:pointer;margin-bottom:16px}
  .refcard .refthumb{width:40px;height:40px;border-radius:8px;overflow:hidden;flex:none;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:16px}
  .refcard .refthumb img{width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply}
  .refcard .reftxt{flex:1;min-width:0}
  .refcard .refk{font-size:10px;color:var(--sub)}
  .refcard .reftt{font-size:12.5px;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .refcard .refgo{color:var(--sub);font-size:16px}
  .dmphoto{padding:0 12px;border:1px solid var(--line);border-radius:20px;background:var(--paper);font-size:16px;cursor:pointer}
  .dmphoto.on{background:#fbe7d9;border-color:#f1c3a3}
  .ctools{display:flex;gap:8px;margin-top:10px}
  .ctool{flex:1;padding:10px;border-radius:11px;border:1px solid var(--line);background:var(--paper);font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
  .ctool.on{background:#e6efe6;border-color:var(--green);color:var(--green)}
  .ecard{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px 16px 14px;text-align:center;margin-top:6px}
  .ectitle{font-size:17px;font-weight:600;line-height:1.6;font-family:"Songti SC","STSong",serif;outline:none;border:1.5px dashed transparent;border-radius:8px;padding:4px 6px;min-height:30px;color:var(--ink)}
  .ectitle:focus{border-color:var(--warm);background:#fffaf3}
  .ecillu{margin:10px 0 2px}
  .ecillu img.illu{max-width:200px;margin:6px auto}
  .ecillu svg{width:120px;height:112px}
  img.illu.rawphoto{mix-blend-mode:normal;filter:none;border-radius:10px}
  .ec-toggle{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:3px;margin-top:10px}
  .ec-toggle button{flex:1;padding:8px 0;border:none;border-radius:9px;font-size:13px;font-weight:600;background:transparent;color:var(--sub);cursor:pointer}
  .ec-toggle button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .ginvite{text-align:center}
  .ginvite .gie{font-size:42px;margin-bottom:12px}
  .ginvite .git{font-size:21px;font-weight:800;line-height:1.6;font-family:"Songti SC","STSong",serif;margin-bottom:8px;color:var(--ink)}
  .ginvite .gis{font-size:13px;color:var(--sub);margin-bottom:22px}
  .ginvite .btnp{margin-bottom:10px}
  .ginvite .giall{width:100%;padding:11px;border-radius:12px;border:1px solid var(--line);background:var(--paper);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer}
  .bcast{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);margin:0 2px 8px;cursor:pointer}
  .bcast input{width:15px;height:15px;accent-color:var(--green)}
  .poster .title{font-size:14px;line-height:1.55;font-weight:600;letter-spacing:.3px;font-family:"Songti SC","STSong",serif;cursor:pointer}
  .poster .art{padding:6px 0 2px;cursor:pointer}
  .poster .art svg{width:92px;height:88px}
  .poster .wm{font-size:9px;color:#cabfae;letter-spacing:1px;margin-top:2px}
  .poster .bar{display:flex;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
  .poster .act{flex:1;font-size:11px;color:var(--sub);background:var(--bg);border-radius:9px;padding:6px 0;cursor:pointer;transition:.15s;font-weight:600}
  .poster .act.on{background:#fbe7d9;color:var(--flower)}
  .poster .act.on2{background:#e6efe6;color:var(--green)}
  .fab{position:absolute;bottom:24px;right:18px;height:48px;padding:0 18px;border-radius:24px;background:var(--ink);color:#f6f1e8;border:none;font-size:14px;font-weight:700;box-shadow:0 8px 20px rgba(0,0,0,.25);cursor:pointer;z-index:20;display:flex;align-items:center;gap:6px}
  .mask{position:absolute;inset:0;background:rgba(30,24,16,.5);z-index:30;display:none;align-items:flex-end}
  .mask.on{display:flex;animation:fade .25s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--bg);width:100%;border-radius:22px 22px 0 0;padding:8px 18px 24px;max-height:92%;overflow-y:auto;animation:up .3s ease;scrollbar-width:none}
  .sheet::-webkit-scrollbar{display:none}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .grab{width:38px;height:4px;background:#d8cdba;border-radius:2px;margin:8px auto 14px}
  #amask .sheet,#pmask .sheet{height:100%;max-height:100%;border-radius:0;padding-top:14px}
  .backrow{font-size:14px;color:var(--sub);cursor:pointer;padding:2px 0 14px;font-weight:600}
  .dbar{display:flex;justify-content:flex-end;position:relative;height:22px;margin-bottom:2px}
  .dmore{font-size:20px;color:var(--sub);cursor:pointer;padding:0 6px;letter-spacing:1px;line-height:1}
  .moremenu{position:absolute;top:26px;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;display:none;z-index:6;min-width:168px}
  .moremenu.on{display:block}
  .mi{padding:12px 16px;font-size:13.5px;cursor:pointer;border-bottom:1px solid var(--line)}
  .mi:last-child{border-bottom:none}
  .poster2{text-align:center;padding:4px 8px 0}
  .poster2 .ptitle{font-size:19px;font-weight:600;font-family:"Songti SC","STSong",serif;line-height:1.65;margin-bottom:8px}
  .poster2 img.illu{max-width:270px;margin:6px auto 2px}
  .poster2 .pwm{font-size:10px;color:#cabfae;letter-spacing:1px;margin-top:6px}
  .poster2 .pmeta{font-size:11px;color:var(--sub);margin-top:10px}
  .actzone{text-align:center;margin-top:20px}
  .actzone .actcount{font-size:13px;color:var(--sub);margin-bottom:12px}
  .actzone .actcount b{color:var(--ink);font-size:15px}
  .react2{display:flex;gap:10px;justify-content:center;margin:18px 0 20px}
  .btnp{width:100%;padding:15px;border-radius:14px;border:none;background:var(--green);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  .btnp.done{background:#e6efe6;color:var(--green)}
  .invite .proof{font-size:12px;color:var(--sub);text-align:center;margin-top:12px}
  .invite .proof b{color:var(--ink)}
  .ilink{color:var(--warm);font-weight:600;cursor:pointer;white-space:nowrap}
  .pledgecollapse{display:none;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:12px}
  .pledgecollapse.on{display:block}
  .pcaption{font-size:11.5px;color:#8a7f72;line-height:1.6;margin-bottom:10px}
  .pledgecollapse .ilink{display:inline-block;margin-top:8px;font-size:12px}
  .dposter{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:20px 16px 14px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
  .danmu-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .danmu{position:absolute;left:100%;white-space:nowrap;background:rgba(255,253,248,.86);border:1px solid var(--line);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--ink);animation:dm linear infinite}
  @keyframes dm{from{transform:translateX(0)}to{transform:translateX(calc(-100vw - 100%))}}
  .footlinks{text-align:center;margin:12px 0 14px;font-size:12px}
  .dmbar{display:flex;gap:8px;margin-bottom:12px}
  .dmbar input{flex:1;border:1px solid var(--line);border-radius:20px;padding:9px 14px;font-size:13px;background:var(--paper);font-family:inherit;color:var(--ink)}
  .dmbar input:focus{outline:none;border-color:var(--warm)}
  .dmbar button{padding:9px 16px;border-radius:20px;border:none;background:var(--ink);color:#f6f1e8;font-size:13px;font-weight:600;cursor:pointer}
  .dposter .title{font-size:18px;line-height:1.6;font-weight:600;font-family:"Songti SC","STSong",serif}
  .dposter svg{width:150px;height:140px;margin:8px 0 2px}
  .dposter .wm{font-size:10px;color:#cabfae;letter-spacing:1px;margin-top:4px}
  .dtag{font-size:11px;color:var(--sub);text-align:center;margin-bottom:14px}
  .follow{font-size:11px;color:var(--warm);font-weight:700;float:right}
  .react{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .dreact{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);position:relative;z-index:2}
  .dreact .rc{font-size:12px;padding:6px 11px}
  .rc{padding:7px 13px;border-radius:16px;background:var(--paper);border:1px solid var(--line);font-size:13px;cursor:pointer;transition:.15s;color:var(--ink)}
  .rc.on{background:#fbe7d9;border-color:#f1c3a3}
  .rc .n{color:var(--sub);font-size:12px;margin-left:3px}
  .flowerbox{background:linear-gradient(135deg,#fdeee4,#f7efe0);border-radius:14px;padding:15px;margin-bottom:16px}
  .flowerbox .h{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
  .flowerbox .desc{font-size:11px;color:#8a7f72;line-height:1.5;margin:8px 0 12px}
  .flowerbox .give{width:100%;padding:12px;border-radius:11px;border:none;background:var(--flower);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
  .flowerbox .give.done{background:#f7ddd2;color:var(--flower)}
  .flowerbox .didit{width:100%;padding:11px;border-radius:11px;border:1px solid var(--green);background:transparent;color:var(--green);font-size:13.5px;font-weight:700;cursor:pointer;margin-top:9px}
  .flowerbox .didit.done{background:#e6efe6;border-color:#e6efe6}
  .cmts .ct{font-size:13px;font-weight:700;margin-bottom:10px}
  .cmt{display:flex;gap:9px;margin-bottom:12px}
  .cmt .a{width:28px;height:28px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
  .cmt .b{flex:1}.cmt .b .nm{font-size:12px;color:var(--sub)}.cmt .b .tx{font-size:13.5px;line-height:1.5;margin-top:2px}
  .cmt .own{font-size:9px;background:var(--ink);color:#fff;padding:1px 5px;border-radius:5px;margin-left:5px}
  .sheet h3{font-size:17px;margin-bottom:3px}
  .sheet .hint{font-size:12px;color:var(--sub);margin-bottom:12px}
  .lane{display:flex;gap:8px;margin-bottom:6px}
  .laneb{flex:1;padding:10px;border-radius:11px;border:1px solid var(--line);background:var(--paper);font-size:13px;font-weight:700;color:var(--sub);cursor:pointer}
  .laneb.on{background:var(--ink);color:#f6f1e8;border-color:var(--ink)}
  .step{font-size:12px;font-weight:700;color:var(--ink);margin:14px 2px 8px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{padding:7px 12px;border-radius:14px;background:var(--paper);border:1px solid var(--line);font-size:13px;cursor:pointer;color:var(--ink)}
  .chip.on{background:var(--ink);color:#f6f1e8;border-color:var(--ink)}
  .chip.ex.on{background:#fbe7d9;color:var(--flower);border-color:#f1c3a3}
  .scaffold{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;margin-top:10px;font-family:"Songti SC","STSong",serif;font-size:16px;font-weight:600;line-height:1.6}
  .scaffold .blank{color:var(--flower);border-bottom:1.5px dashed var(--flower);padding:0 4px}
  .miniin,.ta{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:14px;font-family:inherit;background:var(--paper)}
  .ta{min-height:84px;resize:none;line-height:1.5;font-size:15px}
  .miniin{margin-top:8px}
  .miniin:focus,.ta:focus{outline:none;border-color:var(--warm)}
  .pcard{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:16px;text-align:center;margin-top:14px}
  .pcard .lbl{font-size:10px;color:var(--sub);margin-bottom:6px}
  .pcard .big{font-size:17px;font-weight:600;line-height:1.55;font-family:"Songti SC","STSong",serif}
  .pcard svg{width:120px;height:112px;margin:6px 0 2px}
  .pcard .wm{font-size:9px;color:#cabfae;letter-spacing:1px}
  .pcard .tog{font-size:11px;color:var(--warm);cursor:pointer;font-weight:600;margin-top:8px;display:inline-block}
  .pcard .og{font-size:12px;color:var(--sub);margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);display:none}
  .pcard .og.on{display:block}
  .pubrow{font-size:11px;color:var(--flower);text-align:center;margin-top:12px;font-weight:600}
  .pub{width:100%;padding:13px;border-radius:12px;border:none;background:var(--ink);color:#f6f1e8;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
  .loading{display:flex;flex-direction:column;align-items:center;gap:9px;padding:18px;color:var(--sub);font-size:13px}
  .spin{width:24px;height:24px;border:3px solid #eadfce;border-top-color:var(--warm);border-radius:50%;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .gallery{position:absolute;inset:0;background:#5c4a3a;z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px}
  .gallery.on{display:flex;animation:fade .3s}
  .gclose{position:absolute;top:16px;right:20px;color:#f6f1e8;font-size:22px;cursor:pointer;opacity:.8}
  .gcard{background:#fffdf8;border-radius:16px;padding:34px 24px 24px;width:100%;text-align:center;cursor:pointer;box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .gcard .title{font-size:21px;line-height:1.7;font-weight:600;font-family:"Songti SC","STSong",serif}
  .gcard svg{width:175px;height:165px;margin:14px 0 6px}
  .gcard .wm{font-size:10px;color:#cabfae;letter-spacing:1px}
  .gactions{display:flex;gap:12px;margin-top:18px;justify-content:center}

function reframe(raw){
  let t=raw.trim().replace(/^(今天|刚才|昨天|早上|中午|晚上|有一次|某天|这天|那天)[，,、\s]*/,'');
  const who=(t.match(/(便利店阿姨|收银阿姨|阿姨|叔叔|店员|同事|前辈|上司|老板|面试官|师傅|司机|外卖小哥|快递小哥|奶奶|爷爷|妈妈|爸爸|牙医|医生|小孩|路人|前面的人|朋友|邻居)/)||[])[0]||'人';
  const obj=(t.match(/(伞|充电线|座位|鱼刺|电梯|吸管|饭团|椅子|水|植物)/)||[])[0]||'';
  const verb=(t.match(/(递|塞|挑好|挑|帮|让|按住|按|留|卷|缠|推)/)||[])[0]||'';
  let sp=(t.match(/说[，,：:]?[""]?([^""。.！!，,]+)/)||[])[1];
  if(sp){const cut=sp.match(/^.{1,7}?[吧啊呀哦呢了]/);sp=cut?cut[0]:sp.slice(0,7);}
  if(sp){const act=obj&&verb?`把${obj}${verb}给你、`:'';return `会${act}笑着说"${sp}"的${who}`;}
  if(obj&&verb) return `会悄悄帮你把${obj}${verb}好的${who}`;
  let body=t.replace(who,'').replace(/^[，,、\s我]+/,'').replace(/[。.！!]+$/,'').slice(0,16);
  return `会${body}的${who}`;
}
function guessK(t){if(/伞/.test(t))return['umbrella','服务业'];if(/植物|花|浇水/.test(t))return['plant','生活'];if(/充电线|线/.test(t))return['cable','职场'];if(/吸管|奶茶|杯/.test(t))return['cup','服务业'];if(/鱼|饭|妈|做菜/.test(t))return['fish','家人'];if(/椅子|会议/.test(t))return['chair','职场'];if(/烧烤|烤/.test(t))return['grill','生活'];if(/牙医|医生|护士/.test(t))return['tooth','服务业'];if(/面试|同事|前辈/.test(t))return['interview','职场'];return['person','陌生人'];}

$$('#scenebar button').forEach(b=>b.onclick=()=>{$$('#scenebar button').forEach(x=>x.classList.remove('on'));b.classList.add('on');closeAll();const s=b.dataset.s;if(s=='share'){gidx=0;openG(0);}else if(s=='push'){$('#pushscreen').classList.add('on');}});
$('#wxlink').onclick=()=>{$('#pushscreen').classList.remove('on');cdraft={mode:'text',text:'',photo:false};openCompose();};
let tt;function toast(m){const t=$('#toast');t.innerHTML=m;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2800);}
renderCurate();render();
</script>
</body>
